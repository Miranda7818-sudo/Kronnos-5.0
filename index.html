<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>KRONOS — Tu vida, bajo control.</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#080808;
  --s1:#111111;
  --s2:#181818;
  --s3:#222222;
  --b1:#2a2a2a;
  --b2:#333333;
  --acc:#e63946;
  --acc2:#ff6b6b;
  --gold:#f4a261;
  --mint:#2ec4b6;
  --purple:#7b2d8b;
  --white:#f0f0f0;
  --g1:#888888;
  --g2:#555555;
  --g3:#333333;
}
body{background:var(--bg);color:var(--white);font-family:'Inter',-apple-system,sans-serif;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:var(--b1);border-radius:2px;}
input::placeholder,textarea::placeholder{color:var(--g2);}
input[type=time]::-webkit-calendar-picker-indicator,
input[type=date]::-webkit-calendar-picker-indicator,
input[type=datetime-local]::-webkit-calendar-picker-indicator{filter:invert(0.4);}
select{-webkit-appearance:none;appearance:none;}
button{font-family:'Inter',sans-serif;}

/* ── Animations ── */
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes slideRight{from{width:0}to{width:var(--w)}}
@keyframes letterDrop{from{opacity:0;transform:translateY(-40px) scale(.9)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes glowLine{from{width:0;opacity:0}to{width:100px;opacity:1}}
@keyframes tagFade{from{opacity:0;letter-spacing:.5em}to{opacity:1;letter-spacing:.25em}}
@keyframes splashOut{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.04);pointer-events:none}}
@keyframes streak{from{transform:scaleX(0)}to{transform:scaleX(1)}}
@keyframes ping{0%{transform:scale(1);opacity:.8}100%{transform:scale(2.2);opacity:0}}

.fade{animation:fadeUp .22s ease both;}
.fade2{animation:fadeUp .3s ease .08s both;}

/* ── Layout ── */
.app{display:flex;min-height:100vh;}
.sidebar{width:64px;background:var(--s1);border-right:1px solid var(--b1);display:flex;flex-direction:column;align-items:center;padding:20px 0;position:fixed;top:0;left:0;height:100vh;z-index:200;transition:width .25s ease;}
.sidebar.expanded{width:220px;}
.sidebar-logo{font-family:'Syne',sans-serif;font-size:20px;font-weight:800;color:var(--acc);margin-bottom:32px;cursor:pointer;transition:all .2s;white-space:nowrap;overflow:hidden;}
.nav-item{width:100%;display:flex;align-items:center;gap:12px;padding:12px 20px;cursor:pointer;transition:all .18s;border-left:3px solid transparent;color:var(--g1);font-size:13px;white-space:nowrap;overflow:hidden;}
.nav-item:hover{color:var(--white);background:var(--s2);}
.nav-item.active{color:var(--white);border-left-color:var(--acc);background:var(--s2);}
.nav-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center;}
.nav-label{font-size:12px;font-weight:500;letter-spacing:.02em;opacity:0;transition:opacity .2s;}
.sidebar.expanded .nav-label{opacity:1;}
.sidebar-bottom{margin-top:auto;width:100%;}

.main{margin-left:64px;min-height:100vh;transition:margin-left .25s ease;}
.main.shifted{margin-left:220px;}

/* Top bar */
.topbar{padding:16px 28px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--b1);position:sticky;top:0;background:rgba(8,8,8,.92);backdrop-filter:blur(12px);z-index:100;}
.page-title{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;}
.topbar-right{display:flex;align-items:center;gap:16px;}
.time-badge{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:6px 14px;text-align:center;}
.time-badge .t{font-size:15px;font-weight:600;}
.time-badge .d{font-size:10px;color:var(--g1);}
.xp-badge{display:flex;align-items:center;gap:6px;background:linear-gradient(135deg,#1a0a00,#2d1500);border:1px solid #4a2800;border-radius:20px;padding:5px 12px;font-size:12px;font-weight:600;color:var(--gold);}
.notif-btn{width:34px;height:34px;border-radius:10px;background:var(--s2);border:1px solid var(--b1);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;position:relative;transition:all .15s;}
.notif-btn:hover{background:var(--s3);}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:var(--acc);border-radius:50%;border:1.5px solid var(--bg);}
.lang-sel{background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:5px 10px;color:var(--white);font-size:11px;cursor:pointer;outline:none;}
.user-chip{display:flex;align-items:center;gap:8px;cursor:pointer;background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:6px 10px;}
.avatar{width:26px;height:26px;border-radius:8px;background:var(--acc);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;}
.user-name{font-size:12px;font-weight:500;}

/* Content */
.content{padding:28px;max-width:1100px;}

/* Cards */
.card{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:20px;}
.card-sm{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:14px;}
.card-hover{transition:all .2s;}
.card-hover:hover{border-color:var(--b2);transform:translateY(-1px);}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px;}
.kpi{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:18px;position:relative;overflow:hidden;cursor:default;}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent-color,var(--acc));}
.kpi-label{font-size:10px;color:var(--g1);text-transform:uppercase;letter-spacing:.1em;margin-bottom:10px;}
.kpi-value{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;line-height:1;margin-bottom:4px;}
.kpi-sub{font-size:11px;color:var(--g1);}

/* Section title */
.section-title{font-size:11px;text-transform:uppercase;letter-spacing:.12em;color:var(--g1);font-weight:600;margin-bottom:14px;}

/* Progress bar */
.pbar-track{height:4px;background:var(--b1);border-radius:2px;overflow:hidden;}
.pbar-fill{height:100%;border-radius:2px;transition:width .4s ease;}

/* Habit grid */
.habit-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px;}
.hday{width:100%;aspect-ratio:1;border-radius:4px;background:var(--b1);}
.hday.done{background:var(--acc);}
.hday.today{outline:2px solid var(--white);outline-offset:1px;}

/* Streak flame */
.streak{display:flex;align-items:center;gap:4px;font-size:12px;font-weight:600;}
.streak-num{color:var(--gold);}

/* XP bar */
.xp-track{height:6px;background:var(--b1);border-radius:3px;overflow:hidden;margin-top:6px;}
.xp-fill{height:100%;background:linear-gradient(90deg,var(--gold),#e67e22);border-radius:3px;transition:width .5s ease;}

/* Rank badge */
.rank{display:inline-flex;align-items:center;gap:6px;padding:3px 10px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;}

/* Focus */
.focus-timer{font-family:'Syne',sans-serif;font-size:96px;font-weight:800;letter-spacing:-4px;line-height:1;text-align:center;transition:color .3s;}
.focus-ring{width:220px;height:220px;position:relative;margin:0 auto 28px;}
.focus-ring svg{position:absolute;top:0;left:0;transform:rotate(-90deg);}
.focus-center{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;}

/* Tags/badges */
.tag{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;}

/* Toggle */
.toggle{width:36px;height:20px;background:var(--b1);border-radius:10px;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;}
.toggle.on{background:var(--acc);}
.toggle::after{content:'';position:absolute;width:14px;height:14px;background:#fff;border-radius:7px;top:3px;left:3px;transition:left .2s;}
.toggle.on::after{left:19px;}

/* Inputs */
.inp{width:100%;background:var(--s2);border:1px solid var(--b1);border-radius:8px;padding:10px 14px;color:var(--white);font-size:13px;outline:none;font-family:'Inter',sans-serif;transition:border-color .15s;}
.inp:focus{border-color:var(--b2);}
.btn{border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:all .15s;letter-spacing:.02em;}
.btn-primary{background:var(--acc);color:#fff;}
.btn-primary:hover{background:var(--acc2);}
.btn-ghost{background:transparent;color:var(--g1);border:1px solid var(--b1);}
.btn-ghost:hover{color:var(--white);border-color:var(--b2);}
.btn-sm{padding:7px 14px;font-size:12px;}
.btn:disabled{opacity:.35;cursor:not-allowed;}

/* Project board */
.board{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.board-col{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:16px;min-height:300px;}
.board-col-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.board-dot{width:8px;height:8px;border-radius:50%;}
.board-card{background:var(--s2);border:1px solid var(--b1);border-radius:10px;padding:14px;margin-bottom:10px;cursor:pointer;transition:all .18s;}
.board-card:hover{border-color:var(--b2);transform:translateY(-1px);}

/* Achievements */
.achievement{display:flex;align-items:center;gap:12px;padding:12px;background:var(--s2);border:1px solid var(--b1);border-radius:10px;margin-bottom:8px;}
.ach-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.ach-locked{filter:grayscale(1);opacity:.4;}

/* Notification toast */
.toast-container{position:fixed;top:20px;right:20px;z-index:9999;display:flex;flex-direction:column;gap:8px;}
.toast{background:var(--s1);border:1px solid var(--b1);border-radius:12px;padding:14px 18px;min-width:280px;max-width:360px;display:flex;align-items:flex-start;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.6);animation:fadeUp .2s ease;}
.toast-icon{font-size:20px;flex-shrink:0;margin-top:1px;}
.toast-title{font-size:13px;font-weight:600;margin-bottom:2px;}
.toast-body{font-size:12px;color:var(--g1);line-height:1.5;}
.toast-close{margin-left:auto;background:none;border:none;color:var(--g2);cursor:pointer;font-size:16px;flex-shrink:0;}

/* Splash */
.splash{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.splash-letters{display:flex;gap:2px;margin-bottom:20px;}
.splash-letter{font-family:'Syne',sans-serif;font-size:64px;font-weight:800;opacity:0;color:var(--white);}
.splash-red{color:var(--acc);}
.splash-line{height:2px;background:var(--acc);border-radius:1px;margin-bottom:16px;opacity:0;}
.splash-tag{font-size:11px;color:var(--g1);letter-spacing:.3em;text-transform:uppercase;opacity:0;}

/* Auth */
.auth-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:var(--bg);}
.auth-card{width:100%;max-width:380px;}
.auth-logo{font-family:'Syne',sans-serif;font-size:32px;font-weight:800;color:var(--white);margin-bottom:4px;}
.auth-logo span{color:var(--acc);}
.auth-tab{flex:1;background:none;border:none;padding:11px 0;font-size:13px;color:var(--g1);cursor:pointer;letter-spacing:.03em;border-bottom:2px solid transparent;transition:all .15s;font-family:'Inter',sans-serif;}
.auth-tab.active{color:var(--white);border-bottom-color:var(--acc);}
.input-label{font-size:11px;color:var(--g1);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px;}

/* Responsive */
@media(max-width:768px){
  .sidebar{width:0;overflow:hidden;}
  .sidebar.expanded{width:220px;}
  .main{margin-left:0;}
  .main.shifted{margin-left:220px;}
  .kpi-grid{grid-template-columns:repeat(2,1fr);}
  .board{grid-template-columns:1fr;}
  .content{padding:16px;}
}
</style>
</head>
<body>
<div id="root"></div>
<div class="toast-container" id="toastContainer"></div>

<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

/* ── Storage ── */
const S={
  get:(k,fb)=>{try{const v=localStorage.getItem('kro_'+k);return v!=null?JSON.parse(v):fb;}catch{return fb;}},
  set:(k,v)=>{try{localStorage.setItem('kro_'+k,JSON.stringify(v));}catch{}},
};

/* ── Translations ── */
const T={
  es:{appSub:"Tu vida, bajo control.",login:"Iniciar sesión",reg:"Registrarse",name:"Nombre",email:"Correo",pass:"Contraseña",enter:"Entrar →",create:"Crear cuenta →",
    nav:{dash:"Dashboard",tareas:"Tareas",habitos:"Hábitos",metas:"Objetivos",proyectos:"Proyectos",enfoque:"Enfoque",analisis:"Análisis",pend:"Pendientes",recs:"Recordatorios",logros:"Logros"},
    dash:"Dashboard",tasks:"Tareas",habits:"Hábitos",goals:"Objetivos",focus:"Enfoque",pending:"Pendientes",reminders:"Recordatorios",projects:"Proyectos",achievements:"Logros",analysis:"Análisis",
    today:"Hoy",streak:"Racha",xp:"XP",energy:"Energía",save:"Guardar",cancel:"Cancelar",add:"Agregar",delete:"Eliminar",
    focusActive:"Sesión activa",focusWait:"Listo para iniciar",focusBreak:"Tiempo de descanso",
    startFocus:"Iniciar",pauseFocus:"Pausar",resetFocus:"Reiniciar",
    rank0:"Principiante",rank1:"Aprendiz",rank2:"Practicante",rank3:"Experto",rank4:"Maestro",rank5:"Leyenda",
    logout:"Cerrar sesión",lang:"Idioma",notifOn:"Notificaciones activadas",notifOff:"Activa notificaciones",
    good:"¡Excelente trabajo, sigue así! 💪",
  },
  en:{appSub:"Your life, under control.",login:"Sign in",reg:"Sign up",name:"Name",email:"Email",pass:"Password",enter:"Enter →",create:"Create account →",
    nav:{dash:"Dashboard",tareas:"Tasks",habitos:"Habits",metas:"Goals",proyectos:"Projects",enfoque:"Focus",analisis:"Analysis",pend:"Pending",recs:"Reminders",logros:"Achievements"},
    dash:"Dashboard",tasks:"Tasks",habits:"Habits",goals:"Goals",focus:"Focus",pending:"Pending",reminders:"Reminders",projects:"Projects",achievements:"Achievements",analysis:"Analysis",
    today:"Today",streak:"Streak",xp:"XP",energy:"Energy",save:"Save",cancel:"Cancel",add:"Add",delete:"Delete",
    focusActive:"Session active",focusWait:"Ready to start",focusBreak:"Break time",
    startFocus:"Start",pauseFocus:"Pause",resetFocus:"Reset",
    rank0:"Beginner",rank1:"Learner",rank2:"Practitioner",rank3:"Expert",rank4:"Master",rank5:"Legend",
    logout:"Sign out",lang:"Language",notifOn:"Notifications active",notifOff:"Enable notifications",
    good:"Excellent work, keep it up! 💪",
  },
};
const getLang=()=>S.get('lang','es');

/* ── Toast system ── */
let toastId=0;
function showToast(title,body,icon='✨',duration=3500){
  const id=++toastId;
  const c=document.getElementById('toastContainer');
  const el=document.createElement('div');
  el.className='toast';el.id='toast_'+id;
  el.innerHTML=`<div class="toast-icon">${icon}</div><div style="flex:1"><div class="toast-title">${title}</div><div class="toast-body">${body}</div></div><button class="toast-close" onclick="this.closest('.toast').remove()">×</button>`;
  c.appendChild(el);
  setTimeout(()=>el.remove(),duration);
}
function sendNotif(title,body){
  if(Notification.permission==='granted'){
    new Notification('KRONOS · '+title,{body,icon:'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32"><rect width="32" height="32" rx="8" fill="%23e63946"/><text x="16" y="22" text-anchor="middle" font-size="18" fill="white">K</text></svg>'});
  }
  showToast(title,body,'🔔');
}

/* ── Audio engine ── */
let audioCtx=null;
let activeNodes=[];
function getAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function stopAllAudio(){activeNodes.forEach(n=>{try{n.stop();}catch{}});activeNodes=[];}

function playAmbient(type){
  stopAllAudio();
  if(type===null)return;
  const ctx=getAudio();
  if(ctx.state==='suspended')ctx.resume();

  if(type==='rain'){
    // Pink noise rain
    const bufSize=ctx.sampleRate*4;
    const buf=ctx.createBuffer(1,bufSize,ctx.sampleRate);
    const d=buf.getChannelData(0);
    let b0=0,b1=0,b2=0,b3=0,b4=0,b5=0;
    for(let i=0;i<bufSize;i++){
      const w=Math.random()*2-1;
      b0=.99886*b0+w*.0555179;b1=.99332*b1+w*.0750759;
      b2=.96900*b2+w*.1538520;b3=.86650*b3+w*.3104856;
      b4=.55000*b4+w*.5329522;b5=-.7616*b5-w*.0168980;
      d[i]=(b0+b1+b2+b3+b4+b5+w*.5362)*0.11;
    }
    const src=ctx.createBufferSource();src.buffer=buf;src.loop=true;
    const g=ctx.createGain();g.gain.value=.6;
    // Low pass for rain feel
    const f=ctx.createBiquadFilter();f.type='lowpass';f.frequency.value=2000;
    src.connect(f);f.connect(g);g.connect(ctx.destination);
    src.start();activeNodes.push(src);
  }
  else if(type==='ocean'){
    // Ocean waves - modulated noise
    const ctx2=getAudio();
    const buf=ctx2.createBuffer(1,ctx2.sampleRate*8,ctx2.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++){
      const wave=Math.sin(i/ctx2.sampleRate*0.15)*0.5+0.5;
      d[i]=(Math.random()*2-1)*wave*0.3;
    }
    const src=ctx2.createBufferSource();src.buffer=buf;src.loop=true;
    const g=ctx2.createGain();g.gain.value=.7;
    const f=ctx2.createBiquadFilter();f.type='lowpass';f.frequency.value=800;
    src.connect(f);f.connect(g);g.connect(ctx2.destination);
    src.start();activeNodes.push(src);
  }
  else if(type==='forest'){
    // High freq nature sounds
    for(let i=0;i<3;i++){
      setTimeout(()=>{
        const ctx3=getAudio();
        const osc=ctx3.createOscillator();
        const g=ctx3.createGain();
        osc.frequency.value=2000+Math.random()*3000;
        osc.type='sine';
        g.gain.setValueAtTime(0,ctx3.currentTime);
        g.gain.linearRampToValueAtTime(0.04,ctx3.currentTime+0.1);
        g.gain.exponentialRampToValueAtTime(0.001,ctx3.currentTime+1.5);
        osc.connect(g);g.connect(ctx3.destination);
        osc.start();osc.stop(ctx3.currentTime+1.5);
      },i*800+Math.random()*2000);
    }
    // Background noise
    const buf=getAudio().createBuffer(1,getAudio().sampleRate*4,getAudio().sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*0.03;
    const src=getAudio().createBufferSource();src.buffer=buf;src.loop=true;
    const f=getAudio().createBiquadFilter();f.type='bandpass';f.frequency.value=4000;
    const g=getAudio().createGain();g.gain.value=.15;
    src.connect(f);f.connect(g);g.connect(getAudio().destination);
    src.start();activeNodes.push(src);
  }
  else if(type==='cafe'){
    // Café - low murmur
    const buf=getAudio().createBuffer(1,getAudio().sampleRate*4,getAudio().sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1);
    const src=getAudio().createBufferSource();src.buffer=buf;src.loop=true;
    const f=getAudio().createBiquadFilter();f.type='bandpass';f.frequency.value=400;f.Q.value=0.5;
    const g=getAudio().createGain();g.gain.value=.25;
    src.connect(f);f.connect(g);g.connect(getAudio().destination);
    src.start();activeNodes.push(src);
  }
  else if(type==='fire'){
    // Fire crackling
    const buf=getAudio().createBuffer(1,getAudio().sampleRate*3,getAudio().sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.random()*0.4;
    const src=getAudio().createBufferSource();src.buffer=buf;src.loop=true;
    const f=getAudio().createBiquadFilter();f.type='lowpass';f.frequency.value=1200;
    const g=getAudio().createGain();g.gain.value=.5;
    src.connect(f);f.connect(g);g.connect(getAudio().destination);
    src.start();activeNodes.push(src);
  }
}

function playAlarm(){
  const ctx=getAudio();
  if(ctx.state==='suspended')ctx.resume();
  const freqs=[523,659,784,1047];
  freqs.forEach((f,i)=>{
    const osc=ctx.createOscillator();
    const g=ctx.createGain();
    const t=ctx.currentTime+i*0.18;
    osc.frequency.value=f;osc.type='sine';
    g.gain.setValueAtTime(0,t);
    g.gain.linearRampToValueAtTime(0.3,t+0.05);
    g.gain.exponentialRampToValueAtTime(0.001,t+0.4);
    osc.connect(g);g.connect(ctx.destination);
    osc.start(t);osc.stop(t+0.4);
  });
}

    sendNotif('¡Subiste de rango!','Ahora eres '+newRank.label+' 🎉');

}

/* ── Focus Worker via message passing ── */
function useFocusTimer(){
  const [time,setTime]=useState(25*60);
  const [running,setRunning]=useState(false);
  const [phase,setPhase]=useState('work'); // work | break
  const [sessions,setSessions]=useState(0);
  const intervalRef=useRef(null);
  const timeRef=useRef(25*60);
  const runRef=useRef(false);

  const tick=useCallback(()=>{
    if(!runRef.current)return;
    timeRef.current-=1;
    setTime(timeRef.current);
    if(timeRef.current<=0){
      runRef.current=false;
      setRunning(false);
      playAlarm();
      if(phase==='work'){
        const s=sessions+1;setSessions(s);
        sendNotif('¡Sesión completada! 🎉',`Completaste ${s} sesión(es). Tómate un descanso bien merecido.`);
        const breakTime=s%4===0?15*60:5*60;
        timeRef.current=breakTime;setTime(breakTime);setPhase('break');
        showToast('Descanso','Tiempo de descanso: '+(s%4===0?'15':'5')+' min 😌','🌿',4000);
      }else{
        sendNotif('Descanso terminado ⚡','¡A por otra sesión de enfoque!');
        timeRef.current=25*60;setTime(25*60);setPhase('work');
        showToast('¡A trabajar!','Nueva sesión lista. ¡Tú puedes!','🔥',3000);
      }
    }
  },[phase,sessions]);

  useEffect(()=>{
    if(running){
      runRef.current=true;
      intervalRef.current=setInterval(tick,1000);
    }else{
      runRef.current=false;
      clearInterval(intervalRef.current);
    }
    return()=>clearInterval(intervalRef.current);
  },[running,tick]);

  // Keep running when tab is hidden using visibilitychange
  useEffect(()=>{
    const handle=()=>{
      if(!document.hidden&&running){
        clearInterval(intervalRef.current);
        intervalRef.current=setInterval(tick,1000);
      }
    };
    document.addEventListener('visibilitychange',handle);
    return()=>document.removeEventListener('visibilitychange',handle);
  },[running,tick]);

  const setDuration=useCallback((sec)=>{
    clearInterval(intervalRef.current);
    runRef.current=false;
    setRunning(false);
    timeRef.current=sec;
    setTime(sec);
    setPhase('work');
  },[]);

  const toggle=useCallback(()=>{
    if(audioCtx&&audioCtx.state==='suspended')audioCtx.resume();
    setRunning(r=>!r);
  },[]);

  const reset=useCallback(()=>{
    clearInterval(intervalRef.current);
    runRef.current=false;
    setRunning(false);
    timeRef.current=25*60;setTime(25*60);setPhase('work');
  },[]);

  return{time,running,phase,sessions,toggle,reset,setDuration};
}

/* ── Habit heatmap ── */
function HabitHeatmap({history}){
  const days=[];
  const today=new Date();
  for(let i=62;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const k=d.toISOString().slice(0,10);
    days.push({k,done:history.includes(k),today:i===0});
  }
  return(
    <div style={{display:'grid',gridTemplateColumns:'repeat(9,1fr)',gap:3,marginTop:8}}>
      {days.map(d=>(
        <div key={d.k} title={d.k} style={{
          aspectRatio:'1',borderRadius:3,
          background:d.done?'var(--acc)':d.today?'var(--b2)':'var(--b1)',
          outline:d.today?'2px solid var(--acc2)':'none',
          outlineOffset:1,
        }}/>
      ))}
    </div>
  );
}

/* ── Circular progress ── */
function CircularProgress({value,max,size=120,stroke=10,color='var(--acc)'}){
  const pct=Math.min(100,Math.round((value/max)*100));
  const r=(size-stroke)/2;
  const circ=2*Math.PI*r;
  const dash=circ*pct/100;
  return(
    <svg width={size} height={size} style={{transform:'rotate(-90deg)'}}>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke="var(--b1)" strokeWidth={stroke}/>
      <circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke}
        strokeDasharray={`${dash} ${circ}`} strokeLinecap="round" style={{transition:'stroke-dasharray .4s ease'}}/>
    </svg>
  );
}

  function computeStreak(history){
    let s=0;const today=new Date();
    for(let i=0;i<365;i++){
      const d=new Date(today);d.setDate(d.getDate()-i);
      if(history.includes(d.toISOString().slice(0,10)))s++;else break;
    }
    return s;
  }

          <div><div style={{fontSize:22,fontFamily:'Syne',fontWeight:800,marginBottom:2}}>Objetivos</div><div style={{fontSize:12,color:'var(--g1)'}}>Seguimiento cuantitativo</div></div>
          <button className="btn btn-primary" onClick={()=>setShowAdd(v=>!v)}>{showAdd?'✕ Cancelar':'+ Nuevo objetivo'}</button>
        </div>

        {showAdd&&(
          <div className="card fade" style={{marginBottom:20,borderColor:'var(--acc)44'}}>
            <div className="section-title">Nuevo objetivo</div>
            <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:12}}>
              {emojis.map(e=>(<span key={e} onClick={()=>setNewG(g=>({...g,emoji:e}))} style={{fontSize:20,cursor:'pointer',padding:6,borderRadius:8,background:newG.emoji===e?'var(--acc)22':'transparent',outline:newG.emoji===e?'2px solid var(--acc)':'none'}}>{e}</span>))}
            </div>
            <input className="inp" value={newG.title} onChange={e=>setNewG(g=>({...g,title:e.target.value}))} placeholder="Título del objetivo" style={{marginBottom:10}}/>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:10}}>
              <div><div className="input-label">Actual</div><input className="inp" type="number" value={newG.current} min="0" onChange={e=>setNewG(g=>({...g,current:e.target.value}))}/></div>
              <div><div className="input-label">Meta</div><input className="inp" type="number" value={newG.target} min="1" onChange={e=>setNewG(g=>({...g,target:e.target.value}))} placeholder="100"/></div>
              <div><div className="input-label">Unidad</div><input className="inp" value={newG.unit} onChange={e=>setNewG(g=>({...g,unit:e.target.value}))} placeholder="km, págs…"/></div>
            </div>
            <div style={{marginBottom:12}}><div className="input-label">Fecha límite (opcional)</div><input className="inp" type="date" value={newG.deadline} onChange={e=>setNewG(g=>({...g,deadline:e.target.value}))}/></div>
            <div style={{marginBottom:14}}>
              <div className="input-label">Acciones</div>
              <div style={{background:'var(--s2)',borderRadius:8,padding:12,border:'1px solid var(--b1)'}}>
                {newG.actions.map((a,i)=>(<div key={i} style={{display:'flex',gap:8,padding:'6px 0',borderBottom:i<newG.actions.length-1?'1px solid var(--b1)':'none',fontSize:12,alignItems:'center'}}><span style={{width:6,height:6,background:'var(--acc)',borderRadius:'50%',display:'inline-block',flexShrink:0}}/><span style={{flex:1}}>{a.text}</span><button onClick={()=>setNewG(g=>({...g,actions:g.actions.filter((_,j)=>j!==i)}))} style={{background:'none',border:'none',color:'var(--g2)',cursor:'pointer'}}>×</button></div>))}
                <div style={{display:'flex',gap:8,marginTop:newG.actions.length?8:0}}>
                  <input className="inp" value={newA} onChange={e=>setNewA(e.target.value)} onKeyDown={e=>{if(e.key==='Enter'&&newA.trim()){setNewG(g=>({...g,actions:[...g.actions,{id:Date.now(),text:newA,done:false}]}));setNewA('');}}} placeholder="Agrega un paso y presiona Enter" style={{fontSize:12}}/>
                </div>
              </div>
            </div>
            <div style={{display:'flex',gap:8}}>
              <button className="btn btn-primary btn-sm" disabled={!newG.title.trim()||!newG.target} onClick={()=>{
                const t=parseFloat(newG.target),c=parseFloat(newG.current)||0;
                setGoals(gs=>[...gs,{id:Date.now(),title:newG.title,current:Math.min(c,t),target:t,unit:newG.unit||'unidades',deadline:newG.deadline||'',emoji:newG.emoji,actions:newG.actions}]);
                setNewG({title:'',current:'0',target:'',unit:'',deadline:'',emoji:'🎯',actions:[]});setShowAdd(false);
                showToast('Objetivo creado','¡A por ello!','🎯');
              }}>Crear objetivo</button>
              <button className="btn btn-ghost btn-sm" onClick={()=>setShowAdd(false)}>Cancelar</button>
            </div>
          </div>
        )}

        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:16}}>
          {goals.map(g=>{
            const pct=Math.min(100,Math.round((g.current/g.target)*100));
            const raw=g.deadline?new Date(g.deadline):null;
            const days=raw&&!isNaN(raw)?Math.ceil((raw-new Date())/86400000):null;
            const doneA=g.actions?.filter(a=>a.done).length||0;
            return(
              <div key={g.id} className="card card-hover" style={{borderColor:pct>=100?'var(--mint)44':'var(--b1)'}}>
                <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:14}}>
                  <div style={{display:'flex',gap:10,alignItems:'center'}}>
                    <span style={{fontSize:28}}>{g.emoji}</span>
                    <div>
                      <div style={{fontSize:14,fontWeight:600,marginBottom:4}}>{g.title}</div>
                      {days!==null&&<div style={{fontSize:11,color:days<=7?'var(--acc)':'var(--g1)'}}>{days>0?days+' días restantes':days===0?'Vence hoy':'Plazo vencido'}</div>}
                    </div>
                  </div>
                  <div style={{textAlign:'right',display:'flex',alignItems:'flex-start',gap:8}}>
                    <div>
                      <div style={{fontFamily:'Syne',fontSize:26,fontWeight:800,color:pct>=100?'var(--mint)':'var(--white)'}}>{pct}%</div>
                      <div style={{fontSize:10,color:'var(--g1)'}}>{g.current}/{g.target} {g.unit}</div>
                    </div>
                    <button onClick={()=>setGoals(gs=>gs.filter(x=>x.id!==g.id))} style={{background:'none',border:'none',color:'var(--g2)',cursor:'pointer',fontSize:16}}>×</button>
                  </div>
                </div>
                <div className="pbar-track" style={{height:6,marginBottom:14}}>
                  <div className="pbar-fill" style={{width:`${pct}%`,background:pct>=100?'var(--mint)':'var(--acc)',boxShadow:pct>=100?'0 0 10px var(--mint)':''}}/>
                </div>
                {/* Circular progress overlay */}
                <div style={{display:'flex',alignItems:'center',gap:16}}>
                  <CircularProgress value={g.current} max={g.target} size={60} stroke={6} color={pct>=100?'var(--mint)':'var(--acc)'}/>
                  <div style={{flex:1}}>
                    {g.actions?.length>0&&<div style={{fontSize:11,color:'var(--g1)',marginBottom:8}}>📋 {doneA}/{g.actions.length} acciones</div>}
                    <div style={{display:'flex',gap:8}}>
                      <input placeholder="Actualizar..." style={{flex:1,background:'var(--s2)',border:'1px solid var(--b1)',borderRadius:6,padding:'6px 10px',color:'var(--white)',fontSize:12,outline:'none',fontFamily:'Inter'}}
                        onKeyDown={e=>{if(e.key==='Enter'){const n=parseFloat(e.target.value);if(!isNaN(n)){setGoals(gs=>gs.map(x=>x.id===g.id?{...x,current:Math.min(n,x.target)}:x));gainXP(10,'Progreso registrado');e.target.value='';}}}}/>
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
        {goals.length===0&&!showAdd&&<div style={{textAlign:'center',padding:'60px 0',color:'var(--g1)'}}>Sin objetivos. Toca "+ Nuevo objetivo".</div>}
      </div>
    );
  };

            </div>
          </div>

        <div className="board">
          {STATUSES.map(st=>{
            const cols=projects.filter(p=>p.status===st.id);

                  </div>
                  <div style={{background:'var(--s3)',borderRadius:20,padding:'2px 8px',fontSize:11,color:'var(--g1)'}}>{cols.length}</div>

                {cols.map(p=>{

                  const totalSteps=p.steps?.length||0;

                    <div key={p.id} className="board-card">
                      <div style={{display:'flex',justifyContent:'space-between',marginBottom:8}}>

                        <button onClick={()=>setProjects(ps=>ps.filter(x=>x.id!==p.id))} style={{background:'none',border:'none',color:'var(--g2)',cursor:'pointer',marginLeft:'auto',fontSize:14}}>×</button>

                        {p.steps.map(s=>(<div key={s.id} onClick={()=>setProjects(ps=>ps.map(x=>x.id===p.id?{...x,steps:x.steps.map(t=>t.id===s.id?{...t,done:!t.done}:t)}:x))} style={{display:'flex',gap:6,alignItems:'center',padding:'4px 0',cursor:'pointer',opacity:s.done?.5:1}}>
                          <div style={{width:12,height:12,borderRadius:3,border:`1px solid ${s.done?st.color:'var(--b2)'}`,background:s.done?st.color:'transparent',flexShrink:0}}/>

                        </div>))}
                      </div>}
                      <div style={{display:'flex',gap:6,marginTop:10}}>
                        {STATUSES.filter(s=>s.id!==st.id).map(s=>(<button key={s.id} onClick={()=>setProjects(ps=>ps.map(x=>x.id===p.id?{...x,status:s.id}:x))} style={{flex:1,background:'none',border:`1px solid ${s.color}44`,borderRadius:6,padding:'5px 0',fontSize:10,color:s.color,cursor:'pointer',fontFamily:'Inter'}}>→ {s.label.replace('• ','')}</button>))}

            );
          })}
        </div>
      </div>
    );

              <div style={{flex:1}}>

          <button className="btn btn-primary" onClick={()=>setShowAdd(v=>!v)}>{showAdd?'✕':'+ Nuevo'}</button>

        {showAdd&&(

              <div style={{flex:1}}>

              </div>
              <button onClick={()=>setReminders(rs=>rs.filter(x=>x.id!==r.id))} style={{background:'none',border:'none',color:'var(--g2)',cursor:'pointer',fontSize:14}}>×</button>
            </div>
          ))}
        </div>
      </div>
    );
  };

  // ── ACHIEVEMENTS TAB ──
  const AchievementsTab=()=>{

      {id:'first_task',icon:'✅',title:'Primera tarea',desc:'Completa tu primera tarea',color:'var(--mint)',check:()=>tasks.some(t=>t.done)},

      {id:'habits_7',icon:'🧘',title:'7 hábitos',desc:'Crea 7 hábitos diferentes',color:'var(--gold)',check:()=>habits.length>=7},
      {id:'focus_5',icon:'🧠',title:'5 sesiones de enfoque',desc:'Completa 5 sesiones Pomodoro',color:'var(--acc)',check:()=>focus.sessions>=5},
      {id:'all_tasks',icon:'🏆',title:'Día perfecto',desc:'Completa todas las tareas del día',color:'#ffd700',check:()=>tasks.length>0&&tasks.every(t=>t.done)},
    ];
    return(
      <div className="fade">
        <div style={{marginBottom:24}}>
          <div style={{fontSize:22,fontFamily:'Syne',fontWeight:800,marginBottom:2}}>Logros</div>
          <div style={{fontSize:12,color:'var(--g1)'}}>{ACHV.filter(a=>a.check()).length} de {ACHV.length} desbloqueados</div>
        </div>
        <div className="pbar-track" style={{height:8,marginBottom:24,borderRadius:4}}>
          <div className="pbar-fill" style={{width:`${ACHV.filter(a=>a.check()).length/ACHV.length*100}%`,background:'linear-gradient(90deg,var(--acc),var(--gold))'}}/></div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:12}}>
          {ACHV.map(a=>{
            const unlocked=a.check();
            return(
              <div key={a.id} className="card card-hover" style={{opacity:unlocked?1:.5,borderColor:unlocked?a.color+'44':'var(--b1)',transition:'all .2s'}}>
                <div style={{display:'flex',gap:12,alignItems:'center'}}>
                  <div style={{width:48,height:48,borderRadius:12,background:unlocked?a.color+'22':'var(--s3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:24,flexShrink:0,filter:unlocked?'none':'grayscale(1)'}}>
                    {unlocked?a.icon:'🔒'}
                  </div>
                  <div>
                    <div style={{fontSize:13,fontWeight:600,marginBottom:2,color:unlocked?a.color:'var(--white)'}}>{a.title}</div>
                    <div style={{fontSize:11,color:'var(--g1)'}}>{a.desc}</div>
                    {unlocked&&<div style={{fontSize:10,color:a.color,marginTop:4}}>✓ Desbloqueado</div>}
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      </div>
    );
  };

  // ── ANALYSIS TAB ──
  const AnalysisTab=()=>{
    const [aiResult,setAiResult]=useState('');const [aiLoading,setAiLoading]=useState(false);
    const runAI=async()=>{
      setAiLoading(true);setAiResult('');
      const done=tasks.filter(t=>t.done).length,pend=tasks.filter(t=>!t.done).length,habDone=doneH,hour=new Date().getHours();
      try{
        const res=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,messages:[{role:'user',content:`Eres un coach de productividad de élite. Analiza estos datos y da 4-5 insights con recomendaciones accionables, motivadoras y específicas. Sin emojis excesivos. En ${lang==='en'?'English':'español'}.\nHora: ${hour}:00 | Tareas completadas: ${done}/${done+pend} | Hábitos hoy: ${habDone}/${habits.length} | XP total: ${xp} | Racha máx: ${Math.max(0,...habits.map(h=>h.streak))} días`}]})});
        const data=await res.json();
        setAiResult(data.content?.map(c=>c.text||'').join('')||'—');
      }catch{setAiResult('No se pudo conectar. Verifica tu conexión.');}
      setAiLoading(false);
    };
    const DAYS=['L','M','X','J','V','S','D'];
    const weekData=[8,6,9,7,5,3,0];
    return(
      <div className="fade">
        <div style={{display:'grid',gridTemplateColumns:'2fr 1fr',gap:20,marginBottom:20}}>
          <div className="card">
            <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:aiResult||aiLoading?16:0}}>
              <div><div className="section-title">Diagnóstico IA</div><div style={{fontSize:13}}>Análisis personalizado de tu productividad</div></div>
              <button className="btn btn-primary btn-sm" onClick={runAI} disabled={aiLoading}>{aiLoading?'Analizando...':'Ejecutar análisis'}</button>
            </div>
            {(aiResult||aiLoading)&&<>
              <div style={{height:1,background:'var(--b1)',margin:'16px 0'}}/>
              <div style={{fontSize:13,color:aiLoading?'var(--g1)':'var(--white)',lineHeight:1.8,fontStyle:aiLoading?'italic':'normal',animation:'fadeIn .3s'}}>{aiLoading?'Procesando tu información...':aiResult}</div>
            </>}
          </div>
          <div className="card">
            <div className="section-title">Resumen</div>
            {[['⚡','XP Total',xp,'var(--gold)'],['✅','Tareas',`${doneT}/${tasks.length}`,'var(--acc)'],['🔄','Hábitos hoy',`${doneH}/${habits.length}`,'var(--mint)'],['🔥','Racha máx',Math.max(0,...habits.map(h=>h.streak))+' días','var(--gold)']].map(([ic,lb,v,c])=>(
              <div key={lb} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 0',borderBottom:'1px solid var(--b1)'}}>
                <span style={{fontSize:18}}>{ic}</span>
                <div style={{flex:1,fontSize:12,color:'var(--g1)'}}>{lb}</div>
                <div style={{fontFamily:'Syne',fontSize:16,fontWeight:700,color:c}}>{v}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="card" style={{marginBottom:20}}>
          <div className="section-title">Actividad semanal</div>
          <div style={{display:'flex',alignItems:'flex-end',gap:8,height:100}}>
            {weekData.map((v,i)=>(
              <div key={i} style={{flex:1,display:'flex',flexDirection:'column',alignItems:'center',gap:6}}>
                <div style={{width:'100%',borderRadius:6,background:i===6?'var(--b1)':'var(--acc)',opacity:i===6?.3:1,height:`${(v/10)*80}px`,transition:'height .4s ease'}}/>
                <div style={{fontSize:10,color:'var(--g1)'}}>{DAYS[i]}</div>
              </div>
            ))}
          </div>
        </div>
        <div className="card">
          <div className="section-title">Tareas por área</div>
          {['trabajo','personal','salud','educacion','finanzas','hogar','social'].map(a=>{
            const count=tasks.filter(t=>t.category===a).length;
            const done=tasks.filter(t=>t.category===a&&t.done).length;
            if(!count)return null;
            return(<div key={a} style={{display:'flex',alignItems:'center',gap:12,padding:'10px 0',borderBottom:'1px solid var(--b1)'}}>
              <div style={{fontSize:12,width:80,color:'var(--g1)',textTransform:'capitalize'}}>{a}</div>
              <div style={{flex:1}}><div className="pbar-track" style={{height:4}}><div className="pbar-fill" style={{width:`${Math.round(done/count*100)}%`,background:'var(--acc)'}}/></div></div>
              <div style={{fontSize:11,color:'var(--g1)',width:36,textAlign:'right'}}>{done}/{count}</div>
            </div>);
          })}
        </div>
      </div>
    );
  };

  const TABS_MAP={dash:<Dashboard/>,tareas:<TasksTab/>,habitos:<HabitsTab/>,metas:<GoalsTab/>,proyectos:<ProjectsTab/>,enfoque:<FocusTab/>,pend:<PendingTab/>,recs:<RemindersTab/>,logros:<AchievementsTab/>,analisis:<AnalysisTab/>};
  const PAGE_TITLES={dash:Tr.dash,tareas:Tr.tasks,habitos:Tr.habits,metas:Tr.goals,proyectos:Tr.projects,enfoque:Tr.focus,pend:Tr.pending,recs:Tr.reminders,logros:Tr.achievements,analisis:Tr.analysis};

  return(
    <div className="app">
      {/* Sidebar */}
      <div className={`sidebar${sidebarOpen?' expanded':''}`} onMouseEnter={()=>setSidebarOpen(true)} onMouseLeave={()=>setSidebarOpen(false)}>
        <div className="sidebar-logo" onClick={()=>setTab('dash')}>K{sidebarOpen&&<span style={{marginLeft:4,fontSize:16}}>RONOS</span>}</div>
        {NAV_ITEMS.map(item=>(
          <div key={item.id} className={`nav-item${tab===item.id?' active':''}`} onClick={()=>setTab(item.id)}>
            <span className="nav-icon">{item.icon}</span>
            <span className="nav-label">{navLabel(item.id)}</span>
            {(item.id==='pend'&&pendCount>0)||(item.id==='recs'&&recCount>0)?<span style={{marginLeft:'auto',background:'var(--acc)',borderRadius:10,fontSize:9,padding:'1px 5px',fontWeight:700,minWidth:16,textAlign:'center'}}>{item.id==='pend'?pendCount:recCount}</span>:null}
          </div>
        ))}
        <div className="sidebar-bottom">
          <div className="nav-item" onClick={()=>{if(!notifOn)requestNotif();}}>
            <span className="nav-icon">{notifOn?'🔔':'🔕'}</span>
            <span className="nav-label">{notifOn?'Notif. activas':'Activar notif.'}</span>
          </div>
          <div className="nav-item" onClick={logout}>
            <span className="nav-icon">👋</span>
            <span className="nav-label">{Tr.logout}</span>
          </div>
        </div>
      </div>

      {/* Main */}
      <div className={`main${sidebarOpen?' shifted':''}`}>
        <div className="topbar">
          <div className="page-title">{PAGE_TITLES[tab]||tab}</div>
          <div className="topbar-right">
            <select className="lang-sel" value={lang} onChange={e=>changeLang(e.target.value)}>
              <option value="es">🇲🇽 ES</option>
              <option value="en">🇺🇸 EN</option>
            </select>
            <div className="xp-badge">⚡ {xp} XP</div>
            <button className="notif-btn" onClick={()=>{if(!notifOn)requestNotif();else showToast('Notificaciones','Ya están activas 🔔','✅');}}>
              🔔{!notifOn&&<span className="notif-dot"/>}
            </button>
            <div className="time-badge">
              <div className="t">{now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'})}</div>
              <div className="d">{now.toLocaleDateString('es-ES',{weekday:'short',day:'numeric',month:'short'})}</div>
            </div>
            <div className="user-chip" onClick={logout} title={Tr.logout}>
              <div className="avatar">{user.name[0].toUpperCase()}</div>
              <div className="user-name">{user.name}</div>
            </div>
          </div>
        </div>
        <div className="content">
          {TABS_MAP[tab]||<Dashboard/>}
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
